name: build-data

# Rebuilds static open-data files and commits them. Netlify serves the result
# as static assets — no database involved. Public repo = free unlimited Actions.

on:
  schedule:
    - cron: "17 6 * * 1"    # weekly, Mondays 06:17 UTC. Adjust cadence as needed.
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # REQUIRED to commit rebuilt data back. An explicit
                              # permissions block drops all defaults, so this line
                              # also restores the read access checkout needs.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build open-data files
        run: node scripts/build-data.mjs
        env:
          DATA_SOURCES: data-sources.json
          OUT_DIR: artifacts/access-mi/public/data
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

      - name: Populate ACS broadband county data
        run: node scripts/refresh-acs-broadband-county.mjs --apply
        working-directory: artifacts/access-mi
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add artifacts/access-mi/public/data artifacts/access-mi/src/data/acs-broadband-county.generated.json artifacts/access-mi/src/data/acs-broadband-county.ts
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scheduled rebuild $(date -u +%Y-%m-%d)"
            git push
          fi
