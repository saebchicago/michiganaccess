name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: artifacts/access-mi
        run: pnpm typecheck
      - name: Unit tests
        working-directory: artifacts/access-mi
        run: pnpm check:tests
      - name: A11y gate
        working-directory: artifacts/access-mi
        run: pnpm test:a11y
      - name: Provenance gate
        working-directory: artifacts/access-mi
        run: pnpm check:provenance
      - name: Allowlist shrink-only check
        working-directory: artifacts/access-mi
        run: |
          git fetch origin main --depth=1 --quiet 2>/dev/null || true
          ALLOWLIST="provenance-allowlist.json"
          if git show "origin/main:artifacts/access-mi/${ALLOWLIST}" > /dev/null 2>&1; then
            BASE_COUNT=$(git show "origin/main:artifacts/access-mi/${ALLOWLIST}" \
              | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ try{ console.log(JSON.parse(d).violations?.length??0); }catch{ console.log(0); } })")
            PR_COUNT=$(node -e "const {readFileSync}=require('fs'); console.log(JSON.parse(readFileSync('${ALLOWLIST}','utf8')).violations?.length??0);")
            echo "Allowlist: base=${BASE_COUNT} this-branch=${PR_COUNT}"
            if [ "$PR_COUNT" -gt "$BASE_COUNT" ]; then
              echo "ERROR: ${ALLOWLIST} grew from ${BASE_COUNT} to ${PR_COUNT} entries."
              echo "The allowlist is shrink-only. Fix proxy patterns rather than adding allowlist entries."
              exit 1
            fi
          else
            echo "${ALLOWLIST} not yet on origin/main - skipping shrink-only check (initial introduction)"
          fi

  lighthouse:
    # Informational only while a real baseline is established - see the
    # comment at the top of artifacts/access-mi/.lighthouserc.cjs. Does not
    # block merges yet.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: artifacts/access-mi
        run: pnpm build
      - name: Lighthouse CI
        working-directory: artifacts/access-mi
        run: pnpm dlx @lhci/cli@0.14.x autorun
