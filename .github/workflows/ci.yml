name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: artifacts/access-mi
        run: pnpm typecheck
      - name: Unit tests
        working-directory: artifacts/access-mi
        run: pnpm check:tests
