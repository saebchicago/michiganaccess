name: source-link-check
# Checks whether every citation URL in sourceManifest.ts and
# sourcesRegistry.ts still resolves (scripts/check-source-links.mjs).
# Report-only: never edits either registry file, since a dead citation
# needs a human to find the correct replacement URL. Silently refreshes
# and commits src/data/sourceLinkHealth.generated.json each run; opens a
# PR only when a URL is dead now and was not dead in the previous run.
#
# Manual run:
#   gh workflow run source-link-check.yml --ref main
on:
  schedule:
    - cron: "30 13 * * 3"    # Wednesdays 13:30 UTC
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check source citation links
        id: check
        working-directory: artifacts/access-mi
        run: |
          if node scripts/check-source-links.mjs --fail-on-dead; then
            echo "new_dead=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_dead=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit refreshed report (no new dead links)
        if: steps.check.outputs.new_dead == 'false'
        run: |
          git config user.name "source-link-check-bot"
          git config user.email "actions@users.noreply.github.com"
          git add artifacts/access-mi/src/data/sourceLinkHealth.generated.json
          if git diff --staged --quiet; then
            echo "No report changes."
          else
            git commit -m "chore: source link health report $(date -u +%Y-%m-%d)"
            git push
          fi
      - name: Summarize dead links
        if: steps.check.outputs.new_dead == 'true'
        working-directory: artifacts/access-mi
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const report = JSON.parse(
            fs.readFileSync("src/data/sourceLinkHealth.generated.json", "utf8"),
          );
          const dead = report.results.filter(
            (r) => r.status === "client-error" || r.status === "server-error",
          );
          const rows = dead.map(
            (r) => `| ${r.url} | ${r.httpStatus} | ${r.contexts.join("; ")} |`,
          );
          const body = [
            "## Dead source citation link(s) found",
            "",
            "| URL | Status | Cited for |",
            "|---|---|---|",
            ...rows,
            "",
            "Report-only check - this PR does not edit `sourceManifest.ts` or " +
              "`sourcesRegistry.ts`. Find the correct replacement URL for each " +
              "dead citation and update the relevant file by hand, then merge " +
              "this PR to record the refreshed report.",
          ].join("\n");
          fs.writeFileSync("/tmp/pr-body.md", body);
          EOF
      - name: Create PR (new dead link found)
        if: steps.check.outputs.new_dead == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="data/source-link-check-$(date -u +%Y%m%d-%H%M)"
          git config user.name "source-link-check-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add artifacts/access-mi/src/data/sourceLinkHealth.generated.json
          git commit -m "chore: source link health report - dead link(s) found $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Dead source citation link(s) found - $(date -u +%Y-%m-%d)" \
            --body-file /tmp/pr-body.md
