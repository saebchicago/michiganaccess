name: API Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check External APIs
        run: |
          echo "═══ ACCESS MI — SCHEDULED HEALTH CHECK ═══"
          echo "Time: $(date -u)"
          echo ""

          FAILURES=""

          echo -n "CDC PLACES: "
          RESP=$(curl -s -o /tmp/cdc.json -w "%{http_code}" --max-time 15 \
            "https://data.cdc.gov/resource/qnzd-25i4.json?locationid=48126&\$limit=1")
          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/cdc.json'))))" 2>/dev/null || echo "0")
          if [ "$RESP" = "200" ] && [ "$COUNT" -gt "0" ]; then
            echo "✅ HTTP $RESP, $COUNT records"
          else
            echo "❌ HTTP $RESP, $COUNT records"
            FAILURES="$FAILURES CDC_PLACES"
          fi

          echo -n "NWS Alerts: "
          RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "User-Agent: accessmi.org" \
            "https://api.weather.gov/alerts/active?area=MI")
          if [ "$RESP" = "200" ]; then
            echo "✅ HTTP $RESP"
          else
            echo "❌ HTTP $RESP"
            FAILURES="$FAILURES NWS"
          fi

          echo -n "FDA openFDA: "
          RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://api.fda.gov/food/enforcement.json?limit=1")
          if [ "$RESP" = "200" ]; then
            echo "✅ HTTP $RESP"
          else
            echo "❌ HTTP $RESP"
            FAILURES="$FAILURES FDA"
          fi

          echo -n "accessmi.org: "
          RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://accessmi.org/")
          if [ "$RESP" = "200" ]; then
            echo "✅ HTTP $RESP"
          else
            echo "❌ HTTP $RESP"
            FAILURES="$FAILURES SITE_DOWN"
          fi

          echo ""
          if [ -n "$FAILURES" ]; then
            echo "❌ FAILURES DETECTED: $FAILURES"
            exit 1
          else
            echo "✅ All systems operational"
          fi

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-health',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ API Health Check Failed — ' + new Date().toISOString().split('T')[0],
                body: `Scheduled health check detected failures.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
                labels: ['api-health', 'automated'],
              });
            }

      - name: Close Issue on Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-health',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
