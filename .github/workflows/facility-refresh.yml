name: facility-refresh
# Runbooks (owner-dispatch only):
#   PEP population refresh (annual):
#     gh workflow run facility-refresh.yml --ref main -f run_population_refresh=true
#   Trend series - PEP annual + ACS uninsured pair (requires CENSUS_API_KEY secret):
#     gh workflow run facility-refresh.yml --ref main -f run_trend_refresh=true
on:
  schedule:
    - cron: "0 11 * * 1"    # Mondays 11:00 UTC = 06:00 ET
  workflow_dispatch:
    inputs:
      run_population_refresh:
        description: "Also refresh Census PEP population estimates (annual)"
        type: boolean
        default: false
      run_trend_refresh:
        description: "Refresh trendSeries.json (PEP annual + ACS uninsured; requires CENSUS_API_KEY secret)"
        type: boolean
        default: false
permissions:
  contents: write
  pull-requests: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Fetch latest facility data
        run: node artifacts/access-mi/scripts/build-facility-dataset.mjs
      - name: Refresh Census PEP population (owner-dispatch only)
        if: inputs.run_population_refresh == true
        run: node artifacts/access-mi/scripts/refresh-county-population.mjs --apply
      - name: Refresh trend series - PEP + ACS (owner-dispatch only)
        if: inputs.run_trend_refresh == true
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: node artifacts/access-mi/scripts/build-trend-series.mjs
      - name: Check for drift
        id: drift
        run: |
          if git diff --quiet \
            artifacts/access-mi/src/data/verifiedHealthFacilities.json \
            artifacts/access-mi/src/data/countyFacilityReference.json \
            artifacts/access-mi/src/data/trendSeries.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No facility drift - skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run full gate on updated data
        if: steps.drift.outputs.changed == 'true'
        working-directory: artifacts/access-mi
        run: pnpm build && pnpm check:tests
      - name: Capture diff summary
        if: steps.drift.outputs.changed == 'true'
        id: summary
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const before = JSON.parse(
            require("child_process")
              .execSync("git show HEAD:artifacts/access-mi/src/data/verifiedHealthFacilities.json")
              .toString()
          );
          const after = JSON.parse(
            fs.readFileSync("artifacts/access-mi/src/data/verifiedHealthFacilities.json", "utf8")
          );
          const out = process.env.GITHUB_OUTPUT;
          const append = (k, v) => fs.appendFileSync(out, `${k}=${v}\n`);
          append("old_total", before.provenance.mi_total);
          append("new_total", after.provenance.mi_total);
          append("old_date",  before.provenance.fetched_at);
          append("new_date",  after.provenance.fetched_at);
          EOF
      - name: Create PR
        if: steps.drift.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_TOTAL: ${{ steps.summary.outputs.old_total }}
          NEW_TOTAL: ${{ steps.summary.outputs.new_total }}
          OLD_DATE:  ${{ steps.summary.outputs.old_date }}
          NEW_DATE:  ${{ steps.summary.outputs.new_date }}
        run: |
          BRANCH="data/facility-refresh-$(date -u +%Y%m%d-%H%M)"
          git config user.name "facility-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            artifacts/access-mi/src/data/verifiedHealthFacilities.json \
            artifacts/access-mi/src/data/countyFacilityReference.json \
            artifacts/access-mi/src/data/trendSeries.json
          git commit -m "data: facility dataset refresh $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          {
            echo "## Facility Dataset Drift Detected"
            echo ""
            echo "| Metric | Previous | New |"
            echo "|--------|----------|-----|"
            echo "| Total facilities | $OLD_TOTAL | $NEW_TOTAL |"
            echo "| Fetched at (UTC) | $OLD_DATE | $NEW_DATE |"
            echo ""
            echo "Sources: CMS Hospital General Info + HRSA Health Center Service Delivery Sites"
            echo ""
            echo "Full gate passed (check-links, check-counts, check-zip-population, check-county-facilities, vite build, prerender, vitest)."
            echo ""
            echo "**Action required after merge:** Rerun the Supabase seed loader:"
            echo '```bash'
            echo "node artifacts/access-mi/scripts/load-facilities-to-supabase.mjs"
            echo '```'
          } > /tmp/pr-body.md
          gh pr create \
            --title "data: facility dataset refresh $(date -u +%Y-%m-%d)" \
            --body-file /tmp/pr-body.md
