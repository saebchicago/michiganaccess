# Soft-fail policy: transient external-API errors (HTTP 4xx/5xx, network timeout)
# write a warning to $GITHUB_STEP_SUMMARY and route alerts to a single stable
# tracking issue "[CI] API Health Monitor failing" instead of emailing on every
# run. The job always exits 0; real failures (our own code errors) still exit 1.

name: API Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check External APIs
        id: health_check
        run: |
          echo "ACCESS MI — SCHEDULED HEALTH CHECK"
          echo "Time: $(date -u)"
          echo ""

          FAILURES=""

          # CDC PLACES
          echo -n "CDC PLACES: "
          RESP=$(curl -s -o /tmp/cdc.json -w "%{http_code}" --max-time 15 \
            "https://data.cdc.gov/resource/qnzd-25i4.json?locationid=48126&\$limit=1" 2>/dev/null)
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "WARN (network timeout, curl exit $CURL_EXIT)"
            FAILURES="${FAILURES}CDC_PLACES(timeout) "
          elif echo "$RESP" | grep -qE '^[45][0-9]{2}$'; then
            echo "WARN HTTP $RESP"
            FAILURES="${FAILURES}CDC_PLACES(HTTP_${RESP}) "
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/cdc.json'))))" 2>/dev/null || echo "0")
            if [ "$COUNT" -gt "0" ]; then
              echo "OK HTTP $RESP, $COUNT records"
            else
              echo "WARN HTTP $RESP, 0 records"
              FAILURES="${FAILURES}CDC_PLACES(no_data) "
            fi
          fi

          # NWS Alerts
          echo -n "NWS Alerts: "
          RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "User-Agent: accessmi.org" \
            "https://api.weather.gov/alerts/active?area=MI" 2>/dev/null)
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "WARN (network timeout, curl exit $CURL_EXIT)"
            FAILURES="${FAILURES}NWS(timeout) "
          elif echo "$RESP" | grep -qE '^[45][0-9]{2}$'; then
            echo "WARN HTTP $RESP"
            FAILURES="${FAILURES}NWS(HTTP_${RESP}) "
          else
            echo "OK HTTP $RESP"
          fi

          # FDA openFDA
          echo -n "FDA openFDA: "
          RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://api.fda.gov/food/enforcement.json?limit=1" 2>/dev/null)
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "WARN (network timeout, curl exit $CURL_EXIT)"
            FAILURES="${FAILURES}FDA(timeout) "
          elif echo "$RESP" | grep -qE '^[45][0-9]{2}$'; then
            echo "WARN HTTP $RESP"
            FAILURES="${FAILURES}FDA(HTTP_${RESP}) "
          else
            echo "OK HTTP $RESP"
          fi

          # accessmi.org
          echo -n "accessmi.org: "
          RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://accessmi.org/" 2>/dev/null)
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "WARN (network timeout, curl exit $CURL_EXIT)"
            FAILURES="${FAILURES}SITE(timeout) "
          elif echo "$RESP" | grep -qE '^[45][0-9]{2}$'; then
            echo "WARN HTTP $RESP"
            FAILURES="${FAILURES}SITE(HTTP_${RESP}) "
          else
            echo "OK HTTP $RESP"
          fi

          echo ""
          if [ -n "$FAILURES" ]; then
            echo "WARNINGS: $FAILURES"
            {
              echo "## API Health Warnings"
              echo "Transient issues detected (not a build failure):"
              echo ""
              echo "**Failures:** ${FAILURES}"
              echo ""
              echo "**Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All systems operational"
          fi

          echo "api_failures=${FAILURES}" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue on API failure
        if: steps.health_check.outputs.api_failures != ''
        uses: actions/github-script@v7
        env:
          API_FAILURES: ${{ steps.health_check.outputs.api_failures }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = '[CI] API Health Monitor failing';
            const failures = process.env.API_FAILURES;
            const runUrl = process.env.RUN_URL;
            const body = `Scheduled health check detected API failures.\n\n**Failures:** ${failures}\n\n**Run:** ${runUrl}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-health',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing.\n\n**Failures:** ${failures}\n\n**Run:** ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['api-health', 'automated'],
              });
            }

      - name: Close tracking issue on full recovery
        if: steps.health_check.outputs.api_failures == ''
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = '[CI] API Health Monitor failing';
            const runUrl = process.env.RUN_URL;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-health',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `All APIs healthy. Closing.\n\n**Run:** ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }
