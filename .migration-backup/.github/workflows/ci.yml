# Soft-fail policy (scheduled runs): transient external-API errors (HTTP 4xx/5xx,
# network timeout) are logged as warnings in $GITHUB_STEP_SUMMARY and never fail
# the job. A single tracking issue "[CI] CI Build + Smoke Tests failing" is opened
# or updated on any real failure (local checks, parse errors, missing env vars) and
# closed automatically on the next successful run.

name: CI — Build + Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

permissions:
  issues: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure environment
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: API Health Checks
        run: |
          echo "API HEALTH CHECKS"
          PASS=0
          FAIL=0
          WARN_LINES=""

          check_api() {
            local name="$1"
            local url="$2"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null)
            CURL_EXIT=$?
            if [ $CURL_EXIT -ne 0 ]; then
              echo "  WARN $name (network timeout/error)"
              WARN_LINES="${WARN_LINES}\n- ${name}: network timeout or connection error"
              FAIL=$((FAIL + 1))
            elif [ "$STATUS" = "200" ]; then
              echo "  OK $name (HTTP $STATUS)"
              PASS=$((PASS + 1))
            else
              echo "  WARN $name (HTTP $STATUS)"
              WARN_LINES="${WARN_LINES}\n- ${name}: HTTP ${STATUS}"
              FAIL=$((FAIL + 1))
            fi
          }

          check_api "CDC PLACES" "https://data.cdc.gov/resource/qnzd-25i4.json?\$limit=1"
          check_api "NWS Weather" "https://api.weather.gov/alerts/active?area=MI"
          check_api "FDA openFDA" "https://api.fda.gov/food/enforcement.json?limit=1"
          check_api "ClinicalTrials.gov" "https://clinicaltrials.gov/api/v2/studies?pageSize=1"

          echo ""
          echo "Results: $PASS passed, $FAIL warnings"

          if [ "$FAIL" -gt "0" ]; then
            {
              echo "## API Health Warnings"
              echo "$FAIL third-party API(s) returned non-200 or timed out. These are soft failures and do not block the build."
              echo ""
              printf "%b\n" "$WARN_LINES"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: CDC PLACES Data Verification
        run: |
          RESP=$(curl -s -o /tmp/cdc_verify.json -w "%{http_code}" --max-time 15 \
            "https://data.cdc.gov/resource/qnzd-25i4.json?locationid=48126&\$limit=3" 2>/dev/null)
          CURL_EXIT=$?

          if [ $CURL_EXIT -ne 0 ]; then
            echo "WARN CDC PLACES: network timeout (curl exit $CURL_EXIT) — skipping data verification"
            echo "- CDC PLACES Data Verification: network timeout, skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if echo "$RESP" | grep -qE '^[45][0-9]{2}$'; then
            echo "WARN CDC PLACES: HTTP $RESP — skipping data verification"
            echo "- CDC PLACES Data Verification: HTTP $RESP from third-party API, skipped" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/cdc_verify.json'))))" 2>/dev/null || echo "0")
          if [ "$COUNT" -gt "0" ]; then
            echo "CDC PLACES returns $COUNT records for ZIP 48126"
          else
            echo "WARN CDC PLACES: HTTP $RESP but 0 records for ZIP 48126"
            echo "- CDC PLACES Data Verification: HTTP $RESP, 0 records returned, soft-failing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

      - name: TopoJSON Check
        run: |
          if [ -f "public/data/us-counties-10m.json" ]; then
            echo "TopoJSON bundled locally ($(wc -c < public/data/us-counties-10m.json) bytes)"
          else
            echo "TopoJSON not bundled — D3 map may not render"
            exit 1
          fi

      - name: Data Integrity
        run: |
          ALICE=$(grep -o 'value: 41' src/data/data-stories.ts | head -1)
          if [ -n "$ALICE" ]; then
            echo "ALICE value: 41"
          else
            echo "ALICE value missing or wrong"
            exit 1
          fi

      - name: Route Registry
        run: |
          for route in zip-intelligence health-equity-atlas compare equity financial-help reentry data-sources tax-comparison; do
            if grep -q "\"/$route\"" src/config/routes.ts 2>/dev/null; then
              echo "  OK /$route"
            else
              echo "  FAIL /$route NOT IN ROUTES"
              exit 1
            fi
          done

      - name: Credibility Check
        run: |
          echo "CREDIBILITY CHECKS"
          # These files legitimately reference AI features (chat, copilot, legal disclaimers)
          EXCLUDE="--exclude=AskCopilotButton.tsx --exclude=PlaceNarrative.tsx --exclude=BDFinancialModelPage.tsx --exclude=TermsPage.tsx --exclude=PrivacyPage.tsx"
          FOUND=$(grep -ri "ChatGPT\|made.up.by.AI" src/ --include="*.ts" --include="*.tsx" $EXCLUDE -l || true)
          if [ -n "$FOUND" ]; then
            echo "Unauthorized AI references found in:"
            echo "$FOUND"
            exit 1
          else
            echo "No unauthorized AI references found"
          fi

      - name: Open or update tracking issue on CI failure
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = '[CI] CI Build + Smoke Tests failing';
            const runUrl = process.env.RUN_URL;
            const body = `A CI check (not an external API) failed.\n\n**Run:** ${runUrl}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing.\n\n**Run:** ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure', 'automated'],
              });
            }

      - name: Close tracking issue on CI recovery
        if: success()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = '[CI] CI Build + Smoke Tests failing';
            const runUrl = process.env.RUN_URL;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `All CI checks passed. Closing.\n\n**Run:** ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }
