[build]
  command = "npm run build"
  publish = "dist"

# Netlify config for the Access Michigan site.
#
# The [build] block above pins the build command and the publish dir
# (repo-root dist/, which is what the npm run build script ultimately
# copies to). This overrides any build settings configured in the
# Netlify dashboard. The rest of this file adds baseline HTTP security
# headers and a cache header for /data/*.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# The /embed route exists so partners can iframe the widget on their
# own domains. Drop X-Frame-Options for that path only so embedding
# works; the rest of the site stays SAMEORIGIN.
[[headers]]
  for = "/embed*"
  [headers.values]
    X-Frame-Options = ""

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
