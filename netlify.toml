[build]
  command = "npm run build"
  publish = "dist"

# Netlify config for the Access Michigan site.
#
# The [build] block above pins the build command and the publish dir
# (repo-root dist/, which is what the npm run build script ultimately
# copies to). This overrides any build settings configured in the
# Netlify dashboard. The rest of this file adds baseline HTTP security
# headers and a cache header for /data/*.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # script-src/style-src keep 'unsafe-inline': the build prerenders
    # per-route JSON-LD (scripts/prerender-meta.mjs) and the app relies
    # on inline style attributes throughout (Tailwind utility classes
    # plus Framer Motion), so neither is a fixed, hashable set. connect-src
    # and img-src stay broad because the app fetches directly from dozens
    # of federal/state data APIs (CMS, HRSA, CDC, EPA, Census, NWS, etc.)
    # client-side; object-src/base-uri/form-action are locked down since
    # nothing on the site needs them.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://vizhub.healthdata.org https://www.cdc.gov; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# The /embed route exists so partners can iframe the widget on their
# own domains. Drop X-Frame-Options and relax frame-ancestors for that
# path only so embedding works; the rest of the site stays SAMEORIGIN.
[[headers]]
  for = "/embed*"
  [headers.values]
    X-Frame-Options = ""
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://vizhub.healthdata.org https://www.cdc.gov; frame-ancestors *; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# The service worker must never be cached long-term or clients would
# keep running stale app shells after a deploy.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Self-hosted brand fonts. The filenames are stable across deploys, so
# they can be cached aggressively at the edge and in the browser. If
# a font is ever replaced, change the filename to bust the cache.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Renamed routes - declared as <Navigate> inside the SPA. Mirror them
# at the edge so crawlers and direct nav skip the SPA round-trip and
# get the canonical URL via a 301. Order MUST stay above the SPA
# catch-all below; Netlify evaluates redirects top-down.
[[redirects]]
  from = "/health-equity"
  to = "/equity"
  status = 301
[[redirects]]
  from = "/broadband"
  to = "/civic-data"
  status = 301
[[redirects]]
  from = "/chna"
  to = "/chna-explorer"
  status = 301
[[redirects]]
  from = "/map"
  to = "/health-map"
  status = 301
[[redirects]]
  from = "/check-benefits"
  to = "/benefits"
  status = 301
[[redirects]]
  from = "/data-hub"
  to = "/data-and-insights"
  status = 301
[[redirects]]
  from = "/health-data"
  to = "/data"
  status = 301
[[redirects]]
  from = "/representatives"
  to = "/civic-data"
  status = 301
[[redirects]]
  from = "/county-compare"
  to = "/compare"
  status = 301
[[redirects]]
  from = "/snap"
  to = "/data/snap-michigan"
  status = 301
[[redirects]]
  from = "/water"
  to = "/environment"
  status = 301
[[redirects]]
  from = "/civic"
  to = "/civic-data"
  status = 301
[[redirects]]
  from = "/life-events"
  to = "/life-navigator"
  status = 301
[[redirects]]
  from = "/life-event/new-baby"
  to = "/life-navigator?scenario=baby"
  status = 301
[[redirects]]
  from = "/life-event/job-loss"
  to = "/life-navigator?scenario=lost-job"
  status = 301
[[redirects]]
  from = "/life-event/turning-65"
  to = "/life-navigator?scenario=turning-65"
  status = 301
[[redirects]]
  from = "/life-event/eviction"
  to = "/life-navigator?scenario=housing"
  status = 301
[[redirects]]
  from = "/life-event/new-diagnosis"
  to = "/life-navigator?scenario=diagnosis"
  status = 301
[[redirects]]
  from = "/life-event/new-to-michigan"
  to = "/life-navigator?scenario=new-to-mi"
  status = 301
[[redirects]]
  from = "/life-event/reentry"
  to = "/reentry"
  status = 301
[[redirects]]
  from = "/insurance-appeals"
  to = "/health/insurance-appeals"
  status = 301
[[redirects]]
  from = "/partners/health-systems"
  to = "/partnerships/health-systems"
  status = 301

# SPA fallback. Without this, every non-prerendered route 404s on
# direct nav and on hard refresh. The prerender step writes static
# dist/<path>/index.html for the routes in the manifest with
# `prerender: true`; Netlify serves those before falling through to
# this catch-all for everything else. Status 200 (not 301) so the
# URL the user typed is preserved for React Router to consume.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
